<!DOCTYPE html>
<html>
<head>
<title>Distributed Knowledge Sharing Platform</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
}

.container{
width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

input,textarea{
width:100%;
padding:8px;
margin-top:8px;
}

button{
margin-top:10px;
padding:8px 14px;
background:#007bff;
color:white;
border:none;
}

.answer{
background:#f1f5fb;
padding:8px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>Distributed Knowledge Sharing Platform</h1>

<div class="card">

<h3>Ask Question</h3>

<input id="title" placeholder="Title">

<textarea id="description" placeholder="Description"></textarea>

<input id="category" placeholder="Category">

<button onclick="ask()">Submit</button>

</div>

<div class="card">

<h3>Questions</h3>

<div id="questions"></div>

</div>

</div>

<script>

const API="http://127.0.0.1:5000"


function ask(){

fetch(API+"/ask",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
title:document.getElementById("title").value,
description:document.getElementById("description").value,
category:document.getElementById("category").value
})

}).then(()=>load())

}



function load(){

fetch(API+"/questions")

.then(r=>r.json())

.then(data=>{

let html=""

data.forEach(q=>{

html+=`

<div class="card">

<h3>${q.title}</h3>

<p>${q.description}</p>

<b>Category:</b> ${q.category}

<div id="answers-${q.id}"></div>

<textarea id="input-${q.id}" placeholder="Write answer"></textarea>

<button onclick="submitAnswer(${q.id})">Submit Answer</button>

</div>

`

})

document.getElementById("questions").innerHTML=html

data.forEach(q=>loadAnswers(q.id))

})

}



function submitAnswer(id){

fetch(API+"/answer",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
question_id:id,
answer:document.getElementById("input-"+id).value
})

}).then(()=>loadAnswers(id))

}



function loadAnswers(id){

fetch(API+"/answers/"+id)

.then(r=>r.json())

.then(data=>{

let html=""

data.forEach(a=>{
html+=`<div class="answer">${a.answer}</div>`
})

document.getElementById("answers-"+id).innerHTML=html

})

}


load()

</script>

</body>
</html>
